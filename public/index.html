<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Feed Insight</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>Feed Insight</h1>
        <p>피드 수집 결과를 카테고리별로 확인합니다.</p>
      </div>
      <div class="actions">
        <button id="fetchBtn">지금 수집</button>
        <span id="status" class="status">대기</span>
      </div>
    </header>

    <section class="filters">
      <div class="filter-group">
        <label for="category">카테고리</label>
        <select id="category">
          <option value="">전체</option>
        <option value="개발 아이디어">개발 아이디어</option>
        <option value="개발 이슈/논쟁">개발 이슈/논쟁</option>
        <option value="새 도구/제품">새 도구/제품</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="lang">언어</label>
        <select id="lang">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="summaryMode">요약</label>
        <select id="summaryMode">
          <option value="short">간단</option>
          <option value="long" selected>자세히</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="perPage">페이지 크기</label>
        <select id="perPage">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
        </select>
      </div>

      <div class="filter-group grow">
        <label for="search">검색</label>
        <input id="search" type="text" placeholder="제목/요약 검색" />
      </div>

      <div class="filter-group">
        <label for="source">피드</label>
        <select id="source">
          <option value="">전체</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="sort">정렬</label>
        <select id="sort">
          <option value="newest">최신순</option>
          <option value="oldest">오래된순</option>
          <option value="title">제목순</option>
          <option value="source">소스순</option>
        </select>
      </div>
    </section>

    <section id="list" class="list"></section>
    <footer class="pager">
      <button id="prevBtn">이전</button>
      <span id="pageInfo">1 / 1</span>
      <button id="nextBtn">다음</button>
    </footer>
  </main>

  <script src="/app.js"></script>
</body>
</html>
